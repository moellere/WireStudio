id: esp32-c3-supermini
name: ESP32-C3 SuperMini
mcu: esp32
chip_variant: esp32c3
framework: arduino
platformio_board: esp32-c3-devkitm-1
flash_size_mb: 4

rails:
  - {name: "5V",  voltage: 5.0, source: usb}
  - {name: "3V3", voltage: 3.3, source: onboard_regulator}
  - {name: "GND", voltage: 0.0}

# Tiny 22x18mm ESP32-C3 board with USB-C. Native USB-Serial-JTAG lives
# on GPIO18/19, which are NOT broken out -- flashing and logging go
# over the USB-C port. UART0 (GPIO20 RX / GPIO21 TX) is broken out.
# Strap pins:
#   GPIO2  = boot mode. Must be HIGH at boot.
#   GPIO8  = onboard blue LED (active low). Must be HIGH at boot.
#   GPIO9  = BOOT button (active low). Must be HIGH at boot.
# ADC: GPIO0-GPIO4 are ADC1; GPIO5 is ADC2 (shared with WiFi, avoid for
# analog reads). The onboard PCB antenna is sensitive to nearby metal.
default_buses:
  i2c: {sda: GPIO8, scl: GPIO9}
  spi: {clk: GPIO6, miso: GPIO5, mosi: GPIO7}

onboard_peripherals:
  led: {pin: GPIO8, inverted: true}
  boot_button: {pin: GPIO9, inverted: true}

gpio_capabilities:
  GPIO0:  [gpio, adc, adc1]
  GPIO1:  [gpio, adc, adc1]
  GPIO2:  [gpio, adc, adc1, strap, boot_high]
  GPIO3:  [gpio, adc, adc1]
  GPIO4:  [gpio, adc, adc1, pwm]
  GPIO5:  [gpio, adc, adc2, spi_miso, pwm]
  GPIO6:  [gpio, spi_clk, pwm]
  GPIO7:  [gpio, spi_mosi, pwm]
  GPIO8:  [gpio, strap, boot_high, builtin_led, i2c_sda]
  GPIO9:  [gpio, strap, boot_high, button, i2c_scl]
  GPIO10: [gpio, pwm]
  GPIO20: [gpio, uart_rx, serial_rx]
  GPIO21: [gpio, uart_tx, serial_tx]
# KiCad symbol mapping. 16-pad castellated board, modelled as a 2x8
# header until KiCad ships a dedicated SuperMini module symbol.
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_02x08_Odd_Even
  footprint: Connector_PinHeader_2.54mm:PinHeader_2x08_P2.54mm_Vertical
  value: ESP32-C3-SuperMini
