id: uart_gps
name: Generic UART GPS module (NEO-6M / NEO-8M)
category: sensor
use_cases: [gps, location, time_sync, navigation]
aliases: [neo-6m, neo-8m, beitian-880, gp-02]

electrical:
  vcc_min: 3.0
  vcc_max: 5.5
  current_ma_typical: 30
  current_ma_peak: 80
  pins:
    - {role: VCC, kind: power}
    - {role: GND, kind: ground}
    - {role: TX,  kind: uart_tx, voltage: 3.3}
    - {role: RX,  kind: uart_rx, voltage: 3.3}
    # PPS pin (1Hz pulse per second) is rarely connected; omit for 0.1.
  passives:
    - {kind: capacitor, value: "10uF", between: [VCC, GND], purpose: bulk decoupling}

lorawan:
  lib_deps:
    - "mikalhart/TinyGPSPlus@^1.1.0"
  globals: |
    #include <TinyGPS++.h>
    TinyGPSPlus gps;
    HardwareSerial GPSSerial(1);
  setup: |
    {%- if bus is not none %}
      GPSSerial.begin({{ bus.baud | default(9600) }}, SERIAL_8N1, {{ bus.rx }}, {{ bus.tx }});  // RX, TX
    {%- else %}
      GPSSerial.begin({{ params.baud | default(9600) }}, SERIAL_8N1, {{ (pins.RX | default(params.rx_pin) | default(13)) | string | replace('GPIO', '') }}, {{ (pins.TX | default(params.tx_pin) | default(15)) | string | replace('GPIO', '') }});
    {%- endif %}
  loop: |
    while (GPSSerial.available()) gps.encode(GPSSerial.read());  // keep the fix current
  fields:
    # gps / GPSSerial are file-scope singletons (one onboard/external GPS per
    # device), so the C++ exprs and field names are stable, not id-prefixed.
    - name: lat
      bytes: 4
      cpp_type: int32_t
      cpp_expr: (int32_t)(gps.location.lat() * 10000000.0)
      signed: true
      scale: 10000000.0
      ha_unit: "°"
      ha_diagnostic: true
      ha_icon: mdi:latitude
    - name: lon
      bytes: 4
      cpp_type: int32_t
      cpp_expr: (int32_t)(gps.location.lng() * 10000000.0)
      signed: true
      scale: 10000000.0
      ha_unit: "°"
      ha_diagnostic: true
      ha_icon: mdi:longitude
    - name: alt_m
      bytes: 2
      cpp_type: int16_t
      cpp_expr: (int16_t)gps.altitude.meters()
      signed: true
      ha_device_class: distance
      ha_unit: m
      ha_state_class: measurement
      ha_diagnostic: true
    - name: sats
      bytes: 1
      cpp_type: uint8_t
      cpp_expr: (uint8_t)gps.satellites.value()
      ha_state_class: measurement
      ha_diagnostic: true
      ha_icon: mdi:satellite-variant

esphome:
  required_components: [uart]
  yaml_template: |
    gps:
      uart_id: {{ bus.id }}
    {%- if params.sensors is defined and params.sensors %}
    {%- for sensor_key, sensor_cfg in params.sensors.items() %}
      {{ sensor_key }}: {{ sensor_cfg | tojson }}
    {%- endfor %}
    {%- endif %}

params_schema:
  sensors:
    type: object
    description: "Sub-sensors to expose. Keys are GPS sensor names (latitude, longitude, altitude, speed, course, satellites, hdop), values are the sensor config (typically `{ name: ... }`)."

notes: "ESPHome's `gps:` is a singleton. Wire the GPS module's TX to the MCU's RX (i.e. uart bus rx pin) and vice versa -- the module sends NMEA, the MCU only listens. Some clones output 9600 baud out of the box; others 115200."
# KiCad symbol mapping (0.9 schematic export). Generic 4-pin header --
# matches the typical NEO-6M / NEO-8M breakout.
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x04
  footprint: Connector_PinHeader_2.54mm:PinHeader_1x04_P2.54mm_Vertical
  value: UART_GPS
