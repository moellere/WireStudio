id: ssd1306
name: SSD1306 / SH1106 OLED display (I2C)
category: display
use_cases: [oled, display, status]
aliases: [sh1106, sh1107, ssd1309, oled_1in3]

electrical:
  vcc_min: 3.0
  vcc_max: 5.0
  current_ma_typical: 8
  current_ma_peak: 20
  pins:
  - {role: VCC, kind: power}
  - {role: GND, kind: ground}
  - role: SDA
    kind: i2c_sda
    pull_up: {required: true, value: "4.7k", to: VCC}
  - role: SCL
    kind: i2c_scl
    pull_up: {required: true, value: "4.7k", to: VCC}
  - {role: RESET, kind: digital_in, voltage: 3.3}
  passives:
  - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}

lorawan:
  lib_deps:
    - "adafruit/Adafruit SSD1306@^2.5.13"
  requires:
    - "i2c"
  globals: |
    #include <Adafruit_SSD1306.h>
    // Reset is pulsed explicitly in setup() (after Vext power-on), so pass -1 here.
    Adafruit_SSD1306 display(128, 64, &Wire, -1);
    bool oledReady = false;     // false when the OLED is absent/wedged; loop() skips it then
  setup: |
      {%- if params.vext_pin %}
      pinMode({{ params.vext_pin | string | replace('GPIO', '') }}, OUTPUT);
      digitalWrite({{ params.vext_pin | string | replace('GPIO', '') }}, LOW);  // Vext low = OLED power on
      delay(100);                          // let the OLED rail settle before reset/init
      {%- endif %}
      {%- if pins.RESET is defined or params.reset_pin %}
      pinMode({{ (pins.RESET | default(params.reset_pin)) | string | replace('GPIO', '') }}, OUTPUT);   // explicit reset pulse (Heltec sequence)
      digitalWrite({{ (pins.RESET | default(params.reset_pin)) | string | replace('GPIO', '') }}, HIGH); delay(1);
      digitalWrite({{ (pins.RESET | default(params.reset_pin)) | string | replace('GPIO', '') }}, LOW);  delay(20);
      digitalWrite({{ (pins.RESET | default(params.reset_pin)) | string | replace('GPIO', '') }}, HIGH);
      {%- endif %}
      // A floating / held-low SDA (absent or differently-wired OLED, e.g. some
      // TTGO LoRa32 T3 v1.6.1 units) would otherwise let display.begin() spin
      // until the interrupt watchdog reboots the board (TG1WDT). Probe for an ACK
      // first and only init when the OLED answers, so it's best-effort like radio.
      Wire.beginTransmission({{ params.address | default('0x3C') }});
      if (Wire.endTransmission() == 0 && display.begin(SSD1306_SWITCHCAPVCC, {{ params.address | default('0x3C') }})) {
        oledReady = true;
        display.clearDisplay();
        display.setTextSize(1);
        display.setTextColor(SSD1306_WHITE);
        display.setCursor(0, 0);
        display.println("wirestudio");
        display.display();
      } else {
        Serial.println("OLED absent or init failed; continuing without display");
      }
  loop: |
      if (oledReady) {
        display.clearDisplay();
        display.setCursor(0, 0);
      {%- if has_gps | default(false) %}
        display.printf("Sats:%lu %s\n", (unsigned long) gps.satellites.value(),
                       gps.location.isValid() ? "FIX" : "...");
        display.printf("Lat: %.5f\n", gps.location.lat());
        display.printf("Lon: %.5f\n", gps.location.lng());
      {%- endif %}
      {%- if has_axp | default(false) %}
        display.printf("Batt: %u mV\n", batteryMv);
      {%- endif %}
      {%- if has_dht | default(false) %}
        display.printf("Temp: %.1f C\n", dhtTempC);
      {%- endif %}
        display.printf("LoRa: %s\n", node->isActivated() ? "joined" : "no join");
        display.display();
      }

esphome:
  required_components: [i2c]
  yaml_template: |
    display:
      - platform: ssd1306_i2c
        model: "{{ params.model | default('SSD1306 128x64') }}"
        address: "{{ params.address | default('0x3C') }}"
        i2c_id: {{ bus.id }}
        id: {{ id }}
      {%- if pins.RESET is defined %}
        reset_pin: {{ pins.RESET | tojson }}
      {%- endif %}
      {%- if params.update_interval is defined %}
        update_interval: {{ params.update_interval }}
      {%- endif %}
      {%- if params.lambda_ is defined %}
        lambda: {{ params.lambda_ | tojson }}
      {%- endif %}

params_schema:
  address:
    type: string
    enum: ["0x3C", "0x3D"]
    default: "0x3C"
  model:
    type: string
    enum:
    - "SSD1306 128x64"
    - "SSD1306 128x32"
    - "SH1106 128x64"
    - "SH1106 128x32"
    - "SSD1309 128x64"
    default: "SSD1306 128x64"

notes: "The same `ssd1306_i2c` platform drives the SSD1306 and SH1106 controllers -- pick via `model`.
  The cheap 0.96\" I2C OLED is SSD1306 128x64; the 1.3\" white OLED (including the EC11-encoder combo
  modules) is SH1106 128x64. Many breakouts ship with 10kohm pull-ups already; verify before adding more."
# KiCad symbol mapping (0.9 schematic export). Module symbol for the
# common 0.96" I2C breakout.
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x05
  footprint: Connector_PinHeader_2.54mm:PinHeader_1x05_P2.54mm_Vertical
  value: SSD1306
