id: mpu6886
name: MPU6886 6-axis IMU (accel + gyro, I2C)
category: sensor
use_cases: [imu, accelerometer, gyroscope, motion, orientation, vibration]
aliases: ["mpu-6886", "m5stack imu", "invensense imu"]

electrical:
  vcc_min: 1.71
  vcc_max: 3.6
  current_ma_typical: 3
  current_ma_peak: 4
  pins:
    - {role: VCC, kind: power}
    - {role: GND, kind: ground}
    - role: SDA
      kind: i2c_sda
      pull_up: {required: true, value: "4.7k", to: VCC}
    - role: SCL
      kind: i2c_scl
      pull_up: {required: true, value: "4.7k", to: VCC}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}

esphome:
  required_components: [i2c]
  yaml_template: |
    sensor:
      - platform: mpu6886
        address: "{{ params.address | default('0x68') }}"
        i2c_id: {{ bus.id }}
        update_interval: {{ params.update_interval | default('60s') }}
        accel_x:
          name: "{{ label }} Accel X"
        accel_y:
          name: "{{ label }} Accel Y"
        accel_z:
          name: "{{ label }} Accel Z"
        gyro_x:
          name: "{{ label }} Gyro X"
        gyro_y:
          name: "{{ label }} Gyro Y"
        gyro_z:
          name: "{{ label }} Gyro Z"
        temperature:
          name: "{{ label }} Die Temp"

params_schema:
  address:
    type: string
    enum: ["0x68", "0x69"]
    default: "0x68"
    description: "AD0 pin: GND=0x68, VCC=0x69"
  update_interval:
    type: string
    default: "60s"
    description: "How often to publish a fresh reading. The chip samples at its configured ODR regardless."

notes: |
  6-axis IMU (3-axis accelerometer + 3-axis gyroscope) plus an on-die
  temperature sensor -- the InvenSense MPU6886 that ships onboard the
  M5Stack Atom / AtomS3 / Core family. 1.71-3.6V, I2C at 0x68 (or 0x69
  with AD0 high). ESPHome's `mpu6886` platform mirrors the mpu6050 one.
# KiCad symbol mapping. No stock KiCad symbol for the MPU6886 breakout;
# render the 4-pin I2C header (VCC/GND/SDA/SCL) generically.
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x04
  footprint: Connector_PinHeader_2.54mm:PinHeader_1x04_P2.54mm_Vertical
  value: MPU6886
