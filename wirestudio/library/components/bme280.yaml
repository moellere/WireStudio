id: bme280
name: Bosch BME280 (T/H/P)
category: sensor
use_cases: [temperature, humidity, pressure, weather]
aliases: [bmp280, bme680]

electrical:
  vcc_min: 1.8
  vcc_max: 3.6
  current_ma_typical: 0.6
  current_ma_peak: 4
  pins:
  - {role: VCC, kind: power}
  - {role: GND, kind: ground}
  - role: SDA
    kind: i2c_sda
    pull_up: {required: true, value: "4.7k", to: VCC}
  - role: SCL
    kind: i2c_scl
    pull_up: {required: true, value: "4.7k", to: VCC}
  passives:
  - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}

esphome:
  required_components: [i2c]
  yaml_template: |
    sensor:
      - platform: bme280_i2c
        address: "{{ params.address | default('0x76') }}"
        i2c_id: {{ bus.id }}
        temperature:
          name: "{{ label }} Temperature"
    {%- if params.temperature_on_value is defined %}
          on_value: {{ params.temperature_on_value | tojson }}
    {%- endif %}
    {%- if params.temperature_on_value_range is defined %}
          on_value_range: {{ params.temperature_on_value_range | tojson }}
    {%- endif %}
        humidity:
          name: "{{ label }} Humidity"
    {%- if params.humidity_on_value is defined %}
          on_value: {{ params.humidity_on_value | tojson }}
    {%- endif %}
    {%- if params.humidity_on_value_range is defined %}
          on_value_range: {{ params.humidity_on_value_range | tojson }}
    {%- endif %}
        pressure:
          name: "{{ label }} Pressure"
    {%- if params.pressure_on_value is defined %}
          on_value: {{ params.pressure_on_value | tojson }}
    {%- endif %}
    {%- if params.pressure_on_value_range is defined %}
          on_value_range: {{ params.pressure_on_value_range | tojson }}
    {%- endif %}

capability:
  role: sensor
  provides:
    - {event: on_value, kind: value, channel: temperature}
    - {event: on_value_range, kind: event, channel: temperature}
    - {event: on_value, kind: value, channel: humidity}
    - {event: on_value_range, kind: event, channel: humidity}
    - {event: on_value, kind: value, channel: pressure}
    - {event: on_value_range, kind: event, channel: pressure}

params_schema:
  address:
    type: string
    enum: ["0x76", "0x77"]
    default: "0x76"

notes: "3V3 only. On 5V boards, place behind level shifter or use 3V3 rail."
# KiCad symbol mapping (0.9 schematic export).
kicad:
  symbol_lib: Sensor
  symbol: BME280
  footprint: Package_LGA:Bosch_LGA-8_2.5x2.5mm_P0.65mm_ClockwisePinNumbering
  pin_map:
    VCC: VDD
    SDA: SDI
    SCL: SCK
