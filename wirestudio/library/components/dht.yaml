id: dht
name: DHT11 / DHT22 / AM2302 temperature + humidity
category: sensor
use_cases: [temperature, humidity, weather]
aliases: [dht11, dht22, am2302, am2301, rht03]

electrical:
  vcc_min: 3.3
  vcc_max: 5.5
  current_ma_typical: 1
  current_ma_peak: 2
  pins:
    - {role: VCC, kind: power}
    - {role: GND, kind: ground}
    - role: DATA
      kind: digital_in
      voltage: 3.3
      pull_up: {required: true, value: "10k", to: VCC}
  passives:
    - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}

lorawan:
  lib_deps:
    - "adafruit/DHT sensor library@^1.4.6"
  globals: |
    #include <DHT.h>
    DHT {{ id }}_dht({{ pin | default(pins.DATA) | default(params.pin) }}, {{ params.model | default('DHT22') }});
    float {{ id }}_tempC = 0.0;
    float {{ id }}_humidity = 0.0;
  setup: |
    {{ id }}_dht.begin();
  loop: |
    {
      float _t = {{ id }}_dht.readTemperature();
      float _h = {{ id }}_dht.readHumidity();
      if (!isnan(_t)) {{ id }}_tempC = _t;
      if (!isnan(_h)) {{ id }}_humidity = _h;
    }
  fields:
    - name: temp_c
      bytes: 2
      cpp_type: int16_t
      cpp_expr: (int16_t)({{ id }}_tempC * 100.0)
      signed: true
      scale: 100.0
    - name: humidity
      bytes: 1
      cpp_type: uint8_t
      cpp_expr: (uint8_t){{ id }}_humidity

esphome:
  required_components: []
  yaml_template: |
    sensor:
      - platform: dht
        model: {{ params.model | default('DHT22') }}
        pin: {{ pins.DATA | tojson }}
        temperature:
          name: "{{ label }} Temperature"
        humidity:
          name: "{{ label }} Humidity"
    {%- if params.update_interval is defined %}
        update_interval: {{ params.update_interval }}
    {%- endif %}

params_schema:
  model:
    type: string
    enum: [DHT11, DHT22, AM2302, RHT03]
    default: DHT22
  update_interval:
    type: string
    default: "60s"

notes: "Single-wire bidirectional protocol. DHT22 / AM2302 modules ship with the 10K pull-up populated; bare DHT11s do not. Polling faster than 1Hz returns stale data and the ESPHome platform will warn."
# KiCad symbol mapping (0.9). DHT11 + DHT22 share a symbol + 4-pin
# breakout; the module form omits the unused NC pin.
kicad:
  symbol_lib: Sensor
  symbol: DHT11
  footprint: Sensor:Aosong_DHT11_5.5x12.0_P2.54mm
  value: DHT11/DHT22
  pin_map:
    VCC: VDD
