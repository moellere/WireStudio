id: bmp180
name: BMP180 / BMP085 barometric pressure + temperature (I2C)
category: sensor
use_cases: [temperature, pressure, weather, altitude]
aliases: ["bmp085", "barometric"]

electrical:
  vcc_min: 1.8
  vcc_max: 3.6
  current_ma_typical: 0.005
  current_ma_peak: 1
  pins:
  - {role: VCC, kind: power}
  - {role: GND, kind: ground}
  - role: SDA
    kind: i2c_sda
    pull_up: {required: true, value: "4.7k", to: VCC}
  - role: SCL
    kind: i2c_scl
    pull_up: {required: true, value: "4.7k", to: VCC}
  passives:
  - {kind: capacitor, value: "100nF", between: [VCC, GND], purpose: decoupling}

esphome:
  required_components: [i2c]
  yaml_template: |
    sensor:
      - platform: bmp085
        i2c_id: {{ bus.id }}
        update_interval: {{ params.update_interval | default('60s') }}
        temperature:
          name: "{{ label }} Temperature"
    {%- if params.temperature_on_value is defined %}
          on_value: {{ params.temperature_on_value | tojson }}
    {%- endif %}
        pressure:
          name: "{{ label }} Pressure"
    {%- if params.pressure_on_value is defined %}
          on_value: {{ params.pressure_on_value | tojson }}
    {%- endif %}

capability:
  role: sensor
  provides:
    - {event: on_value, kind: value, channel: temperature}
    - {event: on_value, kind: value, channel: pressure}

params_schema:
  update_interval:
    type: string
    default: "60s"

notes: |
  Older sibling of the BME280 -- temperature + pressure but no humidity,
  fixed address 0x77, 3.3V only. The bmp085 ESPHome platform covers both
  BMP085 and BMP180 (hardware-compatible). Worth keeping for legacy
  modules people already have on hand; pick the BMP280 / BME280 for new
  builds.
# KiCad symbol mapping (0.9 schematic export). BMP085 / BMP180 share
# pinout + symbol in kicad-symbols.
kicad:
  symbol_lib: Connector_Generic
  symbol: Conn_01x04
  footprint: Connector_PinHeader_2.54mm:PinHeader_1x04_P2.54mm_Vertical
  value: BMP180
