name: release

# Tag-triggered PyPI publish.
#
# Setup (one-time, on PyPI side):
#   1. Manually claim the wirestudio name with twine + a project-scoped
#      API token: `pip install build twine && python -m build &&
#      twine upload dist/*`.
#   2. After the project exists on PyPI, configure a Trusted Publisher
#      at https://pypi.org/manage/project/wirestudio/settings/publishing/
#      pointing at this repo / release.yml / environment `pypi`.
#   3. Create the matching `pypi` GitHub environment in repo settings.
#
# Trigger: any pushed `v*` tag + manual workflow_dispatch. Tag must
# match the version in wirestudio/__init__.py (pyproject reads it
# dynamically from there at build time).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publisher OIDC

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build tooling
        run: pip install --upgrade build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Validate metadata
        run: twine check dist/*
      - name: Verify wheel bundles library + examples
        # The wheel is broken if components/, boards/, or examples/
        # don't ride inside it. Asserting here keeps the gate honest
        # even if package-data config drifts.
        run: |
          python - <<'PY'
          import zipfile, os, sys
          whl = sorted([f for f in os.listdir('dist') if f.endswith('.whl')])[-1]
          with zipfile.ZipFile(f"dist/{whl}") as z:
              names = set(z.namelist())
          required = (
              "wirestudio/library/components/",
              "wirestudio/library/boards/",
              "wirestudio/examples/",
              "wirestudio/schema/",
          )
          missing = [p for p in required if not any(n.startswith(p) for n in names)]
          if missing:
              print(f"wheel missing data: {missing}", file=sys.stderr)
              sys.exit(1)
          print(f"wheel data OK ({whl})")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    # Auto-create the GitHub Release sidebar object on tag push, with the
    # CHANGELOG section for this version as the body. Without this the
    # tag publishes to PyPI but the repo page keeps highlighting the
    # previous release as "Latest" -- mirroring the prod overlay gap that
    # bump-prod (#121) closed for the deploy side.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the Release
    steps:
      - uses: actions/checkout@v4
      - name: Extract CHANGELOG section for this version
        id: notes
        run: |
          # GITHUB_REF_NAME is v0.17.0; strip the leading v to match the
          # CHANGELOG heading shape ("## [0.17.0] — ...").
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          # If the CHANGELOG drifted from the tag (e.g. forgot to date the
          # section, or the heading shape changed), still create the Release
          # so the sidebar updates -- with an obvious sentinel body so the
          # gap is loud.
          if ! [ -s release-notes.md ]; then
            printf 'Release %s\n\n(no matching CHANGELOG section found at tag time)\n' "$version" > release-notes.md
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.notes.outputs.version }}
          body_path: release-notes.md
          # Pre-release detection: pep440-style pre-release suffixes
          # (rc, a, b, dev) on the version make this true. We don't ship
          # those today; the flag is here so we don't accidentally promote
          # a future v0.18.0-rc1 to "Latest".
          prerelease: ${{ contains(steps.notes.outputs.version, '-') || contains(steps.notes.outputs.version, 'rc') || contains(steps.notes.outputs.version, 'a') || contains(steps.notes.outputs.version, 'b') || contains(steps.notes.outputs.version, 'dev') }}
