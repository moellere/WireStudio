name: docker

# Build + publish the runtime image to GitHub Container Registry.
#
# Triggers:
#   - push to dev       -> ghcr.io/<owner>/wirestudio:dev + :sha-<short>
#   - push to main      -> ghcr.io/<owner>/wirestudio:main + :sha-<short>
#   - tag push v*       -> ghcr.io/<owner>/wirestudio:1.2.3 + :1.2 + :latest
#   - PR target         -> build only (no push), as a sanity gate
#
# Deployment model: the :dev tag rolls forward on every dev merge (point
# a staging Argo app at it); prod pins an immutable release tag (:1.2.3)
# and bumps in git on release. :latest also moves on each release tag if
# you'd rather track that.
#
# Auth: GITHUB_TOKEN with packages:write. No external secrets needed.
#
# Multi-arch: linux/amd64 + linux/arm64 so a Pi 4 / 5 can pull the same
# tag the homelab box uses.

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wirestudio
          # Tag strategy:
          #   dev push       -> :dev, :sha-<short>
          #   main push      -> :main, :sha-<short>
          #   v1.2.3 tag     -> :1.2.3, :1.2, :latest
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=wirestudio
            org.opencontainers.image.description=Agent-driven ESPHome device design tool
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # The LoRaWAN compile-worker variant: WITH_LORAWAN=true bakes in PlatformIO +
  # the [lorawan] extra and pre-compiles every radio board. amd64-only (the
  # espressif32 toolchain via arm64 QEMU is too slow to be worth it) and built
  # only on push, so the lean image stays the fast PR/default path. Published as
  # the `-lorawan` tag suffix (e.g. :dev-lorawan).
  lorawan-image:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wirestudio
          flavor: suffix=-lorawan,latest=false
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          build-args: WITH_LORAWAN=true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=lorawan
          cache-to: type=gha,mode=max,scope=lorawan

  # Roll the dev Argo app forward: pin deploy/overlays/dev to the image
  # just built and commit it back to dev. ArgoCD (automated sync) deploys
  # the new sha. Pushes made with GITHUB_TOKEN don't retrigger workflows,
  # and [skip ci] makes that explicit.
  bump-dev:
    # Needs lorawan-image too: the dev app runs the -lorawan variant, so
    # don't pin its tag until that image is actually pushed (else ArgoCD
    # hits ImagePullBackOff until the slower lorawan build finishes).
    needs: [build, lorawan-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - name: Pin dev overlay to the freshly built image
        run: |
          tag="sha-$(echo "${GITHUB_SHA}" | cut -c1-7)-lorawan"
          file=deploy/overlays/dev/kustomization.yaml
          sed -i -E "s|^( *newTag: ).*|\1${tag}|" "$file"
          if git diff --quiet -- "$file"; then
            echo "dev overlay already at ${tag}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$file"
          git commit -m "deploy(dev): roll to ${tag} [skip ci]"
          git push origin dev

  bump-prod:
    # Mirrors bump-dev but keyed on tag push, not dev-branch push. Rolls
    # deploy/overlays/prod/kustomization.yaml's newTag to the bare semver
    # extracted from the tag (refs/tags/v0.17.0 -> 0.17.0). Closes the
    # process gap that left prod pinned at 0.12.0 across v0.13..v0.17:
    # the prod-bump-during-release step was documented as a comment in the
    # file but never automated, so it got missed every release.
    #
    # Prod runs the LEAN image (no PlatformIO), so we only need the build
    # job here -- not lorawan-image. ArgoCD prod doesn't need the LoRaWAN
    # compile worker; the external-component LoRaWAN path uses
    # fleet-for-esphome for the build.
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Pin prod overlay to the freshly tagged release
        run: |
          # refs/tags/v0.17.0 -> 0.17.0
          version="${GITHUB_REF#refs/tags/v}"
          file=deploy/overlays/prod/kustomization.yaml
          sed -i -E "s|^( *newTag: ).*|\1\"${version}\"|" "$file"
          if git diff --quiet -- "$file"; then
            echo "prod overlay already at ${version}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$file"
          git commit -m "deploy(prod): roll to ${version} [skip ci]"
          git push origin main

  bump-dev-on-tag:
    # On tag push, also roll the dev overlay to the released -lorawan
    # variant (`0.17.0-lorawan` for `v0.17.0`). Complements bump-dev, which
    # tracks dev-branch HEAD via the rolling sha tag: a release moves dev
    # to the released image; the next dev-branch push rolls it forward to
    # the next sha. Lets the dev cluster briefly serve the release version
    # for smoke-testing without a manual edit.
    #
    # Dev runs the -lorawan variant, so this needs lorawan-image too --
    # the same gating as bump-dev avoids ArgoCD ImagePullBackOff.
    needs: [build, lorawan-image]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - name: Pin dev overlay to the freshly tagged release
        run: |
          # refs/tags/v0.17.0 -> 0.17.0-lorawan
          version="${GITHUB_REF#refs/tags/v}"
          tag="${version}-lorawan"
          file=deploy/overlays/dev/kustomization.yaml
          sed -i -E "s|^( *newTag: ).*|\1${tag}|" "$file"
          if git diff --quiet -- "$file"; then
            echo "dev overlay already at ${tag}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$file"
          git commit -m "deploy(dev): roll to ${tag} [skip ci]"
          git push origin dev
