name: docker

# Build + publish the runtime image to GitHub Container Registry.
#
# Triggers:
#   - push to dev       -> ghcr.io/<owner>/wirestudio:dev + :sha-<short>
#   - push to main      -> ghcr.io/<owner>/wirestudio:main + :sha-<short>
#   - tag push v*       -> ghcr.io/<owner>/wirestudio:1.2.3 + :1.2 + :latest
#   - PR target         -> build only (no push), as a sanity gate
#
# Deployment model: the :dev tag rolls forward on every dev merge (point
# a staging Argo app at it); prod pins an immutable release tag (:1.2.3)
# and bumps in git on release. :latest also moves on each release tag if
# you'd rather track that.
#
# Auth: GITHUB_TOKEN with packages:write. No external secrets needed.
#
# Multi-arch: linux/amd64 + linux/arm64 so a Pi 4 / 5 can pull the same
# tag the homelab box uses.

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wirestudio
          # Tag strategy:
          #   dev push       -> :dev, :sha-<short>
          #   main push      -> :main, :sha-<short>
          #   v1.2.3 tag     -> :1.2.3, :1.2, :latest
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=wirestudio
            org.opencontainers.image.description=Agent-driven ESPHome device design tool
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # The LoRaWAN compile-worker variant: WITH_LORAWAN=true bakes in PlatformIO +
  # the [lorawan] extra and pre-compiles every radio board. amd64-only (the
  # espressif32 toolchain via arm64 QEMU is too slow to be worth it) and built
  # only on push, so the lean image stays the fast PR/default path. Published as
  # the `-lorawan` tag suffix (e.g. :dev-lorawan).
  lorawan-image:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wirestudio
          flavor: suffix=-lorawan,latest=false
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          build-args: WITH_LORAWAN=true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=lorawan
          cache-to: type=gha,mode=max,scope=lorawan

  # The PCB-toolchain variant: Dockerfile.pcb on the official KiCad 8 image,
  # with pcbnew, kicad-cli, the pinned gitlab libraries, a Temurin JRE, and
  # the Freerouting jar -- the image that can autoroute and emit routed fab
  # packages. amd64-only and push-only like the lorawan variant. Published as
  # the `-pcb` tag suffix (e.g. :main-pcb).
  pcb-image:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wirestudio
          flavor: suffix=-pcb,latest=false
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.pcb
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=pcb
          cache-to: type=gha,mode=max,scope=pcb

  # The every-feature variant prod runs: Dockerfile.pcb + WITH_LORAWAN=true,
  # so one image carries the PCB toolchain (KiCad + pcbnew + Freerouting) AND
  # the LoRaWAN compile worker (PlatformIO + prewarmed espressif32). Published
  # as the `-full` tag suffix.
  full-image:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wirestudio
          flavor: suffix=-full,latest=false
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.pcb
          platforms: linux/amd64
          build-args: WITH_LORAWAN=true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=full
          cache-to: type=gha,mode=max,scope=full

  # Deployment is NOT handled here. The k8s cluster is driven by the
  # moellere/argocd GitOps repo, where argocd-image-updater watches this
  # registry and rolls each environment automatically:
  #   - staging (app-wirestudio-dev): tracks :main-lorawan by digest
  #   - prod (app-wirestudio): tracks the newest :X.Y.Z-lorawan release tag
  # So a pushed release tag just needs its image built+published above;
  # image-updater git-writes-back the digest and ArgoCD syncs. The old
  # bump-dev / bump-prod / bump-dev-on-tag jobs wrote to deploy/overlays/*
  # in THIS repo, which the cluster never reads -- they were removed.
