esphome:
  name: atomu-onboard
esp32:
  board: m5stack-atom
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
light:
- platform: esp32_rmt_led_strip
  rgb_order: GRB
  pin: GPIO27
  num_leds: 1
  chipset: SK6812
  name: Onboard RGB LED
  id: onboard_led
binary_sensor:
- platform: gpio
  pin: GPIO39
  name: Onboard button
  id: onboard_button
  filters:
  - invert: null
remote_transmitter:
  pin: GPIO12
  carrier_duty_percent: 50%
i2s_audio:
- id: onboard_mic_bus
  i2s_lrclk_pin: GPIO5
microphone:
- platform: i2s_audio
  id: onboard_mic
  i2s_audio_id: onboard_mic_bus
  i2s_din_pin: GPIO19
  adc_type: external
  pdm: true
