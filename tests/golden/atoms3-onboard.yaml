esphome:
  name: atoms3-onboard
esp32:
  board: m5stack-atoms3
  framework:
    type: arduino
  variant: ESP32S3
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
spi:
- id: spi0
  clk_pin: GPIO17
  miso_pin: GPIO13
  mosi_pin: GPIO21
i2c:
- id: i2c0
  sda: GPIO1
  scl: GPIO2
display:
- platform: st7789v
  spi_id: spi0
  cs_pin: GPIO15
  dc_pin: GPIO33
  reset_pin: GPIO34
  backlight_pin: GPIO16
  id: onboard_display
  model: Custom
  width: 128
  height: 128
  offset_width: 2
  offset_height: 1
binary_sensor:
- platform: gpio
  pin: GPIO41
  name: Onboard button
  id: onboard_button
  filters:
  - invert: null
sensor:
- platform: mpu6886
  address: '0x68'
  i2c_id: i2c0
  update_interval: 60s
  accel_x:
    name: Onboard IMU Accel X
  accel_y:
    name: Onboard IMU Accel Y
  accel_z:
    name: Onboard IMU Accel Z
  gyro_x:
    name: Onboard IMU Gyro X
  gyro_y:
    name: Onboard IMU Gyro Y
  gyro_z:
    name: Onboard IMU Gyro Z
  temperature:
    name: Onboard IMU Die Temp
