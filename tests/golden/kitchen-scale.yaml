esphome:
  name: kitchen-scale
esp8266:
  board: d1_mini
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
i2c:
- id: i2c0
  sda: D2
  scl: D1
  frequency: 400kHz
sensor:
- platform: hx711
  id: scale
  name: Kitchen scale
  dout_pin: D5
  clk_pin: D6
  gain: 128
  update_interval: 500ms
  filters:
  - calibrate_linear:
    - 0 -> 0
    - 200000 -> 1000
  - lambda: return x;
display:
- platform: ssd1306_i2c
  model: SSD1306 128x64
  address: '0x3C'
  i2c_id: i2c0
  id: oled1
  reset_pin: D0
  update_interval: 200ms
  lambda: |
    it.printf(0, 0, id(font1), "Weight");
    it.printf(0, 24, id(font2), "%.0f g", id(scale).state);
font:
- file: gfonts://Roboto
  id: font1
  size: 14
- file: gfonts://Roboto
  id: font2
  size: 28
