esphome:
  name: guarded-button-light
esp8266:
  board: d1_mini
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
binary_sensor:
- platform: gpio
  pin: D5
  name: Button
  id: btn
  on_press:
  - if:
      condition:
        switch.is_on: enable
      then:
      - switch.toggle: light
switch:
- platform: gpio
  pin: D7
  name: Enable
  id: enable
- platform: gpio
  pin: D6
  name: Light
  id: light
