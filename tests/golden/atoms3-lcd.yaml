esphome:
  name: atoms3-lcd
esp32:
  board: m5stack-atoms3
  framework:
    type: arduino
  variant: ESP32S3
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
i2c:
- id: i2c0
  sda: GPIO1
  scl: GPIO2
  frequency: 100kHz
display:
- platform: lcd_pcf8574
  dimensions: 20x4
  address: '0x27'
  i2c_id: i2c0
  id: lcd
  update_interval: 1s
  lambda: |
    it.print(0, 0, "WireStudio");
    it.printf(0, 1, "Up %.0fs", id(uptime_s).state);
    it.printf(0, 2, "RSSI %.0f dBm", id(rssi).state);
sensor:
- platform: uptime
  id: uptime_s
  name: AtomS3 LCD Uptime
- platform: wifi_signal
  id: rssi
  name: AtomS3 LCD RSSI
  update_interval: 15s
