esphome:
  name: flow-meter
esp32:
  board: esp32dev
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
sensor:
- platform: pulse_counter
  pin:
    number: GPIO4
  name: Flow
  id: flow
  unit_of_measurement: pulses/min
  update_interval: 10s
light:
- platform: fastled_spi
  chipset: APA102
  data_pin: GPIO23
  clock_pin: GPIO18
  num_leds: 30
  rgb_order: BGR
  name: Status strip
  id: strip
output:
- platform: ledc
  pin: GPIO19
  id: buzzer_out
rtttl:
  output: buzzer_out
  id: buzzer
