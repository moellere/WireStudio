esphome:
  name: tft-touch
esp32:
  board: esp32dev
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
spi:
- id: spi0
  clk_pin: GPIO18
  miso_pin: GPIO19
  mosi_pin: GPIO23
display:
- platform: ili9xxx
  model: ILI9341
  spi_id: spi0
  cs_pin: GPIO5
  dc_pin: GPIO16
  reset_pin: GPIO17
  id: tft
  invert_colors: false
  rotation: 90
touchscreen:
  platform: xpt2046
  id: touch
  cs_pin: GPIO21
  interrupt_pin: GPIO22
  spi_id: spi0
  calibration:
    x_min: 280
    x_max: 3860
    y_min: 340
    y_max: 3860
