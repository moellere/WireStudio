esphome:
  name: weather-station
esp32:
  board: esp32dev
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
i2c:
- id: i2c0
  sda: GPIO21
  scl: GPIO22
  frequency: 100kHz
sensor:
- platform: bmp280_i2c
  address: '0x76'
  i2c_id: i2c0
  temperature:
    name: Weather pressure Temperature
  pressure:
    name: Weather pressure Pressure
  update_interval: 60s
- platform: htu21d
  i2c_id: i2c0
  update_interval: 60s
  temperature:
    name: Weather climate Temperature
  humidity:
    name: Weather climate Humidity
- platform: tsl2561
  i2c_id: i2c0
  address: '0x39'
  name: Weather light Illuminance
  update_interval: 60s
