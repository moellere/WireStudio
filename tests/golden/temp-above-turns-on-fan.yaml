esphome:
  name: temp-threshold-fan
esp8266:
  board: d1_mini
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
i2c:
- id: i2c0
  sda: D2
  scl: D1
  frequency: 400kHz
sensor:
- platform: bme280_i2c
  address: '0x76'
  i2c_id: i2c0
  temperature:
    name: Climate Temperature
    on_value_range:
    - above: 28.0
      then:
      - switch.turn_on: fan
  humidity:
    name: Climate Humidity
  pressure:
    name: Climate Pressure
switch:
- platform: gpio
  pin: D6
  name: Fan
  id: fan
