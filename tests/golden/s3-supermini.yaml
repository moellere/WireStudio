esphome:
  name: s3-supermini
esp32:
  board: esp32-s3-devkitm-1
  framework:
    type: arduino
  variant: ESP32S3
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
light:
- platform: esp32_rmt_led_strip
  rgb_order: GRB
  pin: GPIO48
  num_leds: 1
  chipset: WS2812
  name: Onboard RGB LED
  id: onboard_led
binary_sensor:
- platform: gpio
  pin: GPIO0
  name: Onboard button
  id: onboard_button
  filters:
  - invert: null
