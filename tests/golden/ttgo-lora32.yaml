esphome:
  name: ttgo-lora32
esp32:
  board: ttgo-lora32-v1
  framework:
    type: esp-idf
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
spi:
- id: spi0
  clk_pin: GPIO5
  miso_pin: GPIO19
  mosi_pin: GPIO27
i2c:
- id: i2c0
  sda: GPIO21
  scl: GPIO22
  frequency: 400kHz
sx127x:
  cs_pin: GPIO18
  rst_pin: GPIO23
  dio0_pin: GPIO26
  spi_id: spi0
  frequency: 915000000
  modulation: LORA
  bandwidth: 125_0kHz
  spreading_factor: 7
  coding_rate: CR_4_6
  preamble_size: 8
  sync_value: 18
  crc_enable: true
  pa_pin: BOOST
  pa_power: 10
  rx_start: true
  on_packet:
    then:
    - lambda: '!lambda ESP_LOGD("lora", "Received packet RSSI: %.2f dBm, SNR: %.2f dB, Data: %s", rssi, snr, format_hex(x).c_str());'
display:
- platform: ssd1306_i2c
  model: SSD1306 128x64
  address: '0x3C'
  i2c_id: i2c0
  id: screen
  lambda: |
    it.printf(0, 0, id(display_font), "T3 LoRa32");
    it.printf(0, 16, id(display_font), "V1.6.1");
    it.printf(0, 32, id(display_font), "%.1f dBm", id(wifi_signal_db).state);
time:
- platform: homeassistant
  id: homeassistant_time
switch:
- platform: restart
  name: TTGO LoRa32 Restart
  id: reboot
button:
- platform: template
  name: Send LoRa Packet
  on_press:
    then:
    - sx127x.send_packet:
        data:
        - 222
        - 173
        - 190
        - 239
        - 202
        - 254
        - 186
        - 190
font:
- file: gfonts://Roboto
  id: display_font
  size: 14
sensor:
- platform: wifi_signal
  id: wifi_signal_db
  name: WiFi Signal
  update_interval: 60s
- platform: adc
  pin: GPIO35
  name: Battery Voltage
  attenuation: 12db
  filters:
  - multiply: 2.0
  update_interval: 60s
