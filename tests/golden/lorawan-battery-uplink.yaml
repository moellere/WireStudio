esphome:
  name: lorawan-battery-uplink
esp32:
  board: ttgo-lora32-v1
  framework:
    type: arduino
logger: {}
sensor:
- platform: adc
  pin: GPIO36
  name: Battery
  id: battery
  attenuation: 12db
  update_interval: 30s
  unit_of_measurement: V
- platform: lorawan
  lorawan_id: lw
  sensor: battery
external_components:
- source: github://moellere/lorawan-for-esphome@main
  components:
  - lorawan
lorawan:
  id: lw
  region: US915
  sub_band: 2
  dev_eui: !secret dev_eui
  join_eui: !secret join_eui
  app_key: !secret app_key
  radio:
    chip: sx1276
    cs_pin: GPIO18
    rst_pin: GPIO23
    dio0_pin: GPIO26
