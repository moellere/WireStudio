esphome:
  name: esp32cam-wrover
esp32:
  board: esp-wrover-kit
  framework:
    type: esp-idf
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
esp32_camera:
  external_clock:
    pin: GPIO32
    frequency: 20MHz
  i2c_pins:
    sda: GPIO13
    scl: GPIO12
  data_pins:
  - GPIO5
  - GPIO14
  - GPIO4
  - GPIO15
  - GPIO18
  - GPIO23
  - GPIO36
  - GPIO39
  vsync_pin: GPIO27
  href_pin: GPIO25
  pixel_clock_pin: GPIO19
  power_down_pin: GPIO26
  name: WROVER cam
  resolution: 640x480
esp32_camera_web_server:
- port: 8080
  mode: stream
psram:
  mode: quad
  speed: 40MHz
