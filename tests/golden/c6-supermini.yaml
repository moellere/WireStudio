esphome:
  name: c6-supermini
esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf
  variant: ESP32C6
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
light:
- platform: esp32_rmt_led_strip
  rgb_order: GRB
  pin: GPIO8
  num_leds: 1
  chipset: WS2812
  name: Onboard RGB LED
  id: onboard_led
binary_sensor:
- platform: gpio
  pin: GPIO9
  name: Onboard button
  id: onboard_button
  filters:
  - invert: null
