esphome:
  name: distance_sensor
  on_boot:
    then:
    - light.turn_on: distancelight
    - delay: 2s
    - light.turn_off: distancelight
esp8266:
  board: nodemcuv2
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
sensor:
- platform: ultrasonic
  trigger_pin: D5
  echo_pin: D6
  name: Ultrasonic Sensor
  id: distance
  update_interval: 500ms
  unit_of_measurement: cm
  filters:
  - calibrate_linear:
    - 0.0 -> 0.0
    - 2.0 -> 100
  on_value:
    then:
    - light.turn_on:
        id: distancelight
        red: !lambda return (100-x)/100.0;
        green: !lambda return x / 100.0;
        blue: 0
        transition_length: 0s
light:
- platform: neopixelbus
  variant: 400KBPS
  method: BIT_BANG
  type: RGB
  pin: D1
  num_leds: 1
  name: Distance Sensor Light
  id: distancelight
time:
- platform: homeassistant
  id: homeassistant_time
switch:
- platform: restart
  name: Distance Sensor Restart
