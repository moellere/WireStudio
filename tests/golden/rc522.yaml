esphome:
  name: rc522
  on_boot:
    priority: -10
    then:
    - wait_until:
        api.connected: null
    - logger.log: API is connected!
    - rtttl.play: success:d=24,o=5,b=100:c,g,b
esp8266:
  board: d1_mini
logger:
  baud_rate: 9600
api:
  encryption:
    key: !secret api_key
  services:
  - service: rfidreader_tag_ok
    then:
    - rtttl.play: beep:d=16,o=5,b=100:b
  - service: rfidreader_tag_ko
    then:
    - rtttl.play: beep:d=8,o=5,b=100:b
  - service: play_rtttl
    variables:
      song_str: string
    then:
    - rtttl.play: !lambda return song_str;
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
spi:
- id: spi0
  clk_pin: D5
  miso_pin: D6
  mosi_pin: D7
rc522_spi:
  cs_pin: D8
  reset_pin: D4
  spi_id: spi0
  update_interval: 2s
  on_tag:
    then:
    - homeassistant.event:
        event: esphome.tag_scanned
        data:
          tag_id: !lambda return x;
    - if:
        condition:
          switch.is_on: buzzer_enabled
        then:
        - rtttl.play: success:d=24,o=5,b=100:c,g,b
    - if:
        condition:
          switch.is_on: led_enabled
        then:
        - light.turn_on:
            id: activity_led
            brightness: 100%
            red: 0%
            green: 100%
            blue: 0%
            flash_length: 500ms
light:
- platform: neopixelbus
  variant: 400KBPS
  method: BIT_BANG
  type: RGB
  pin: D3
  num_leds: 1
  name: RC522 Reader LED
  id: activity_led
binary_sensor:
- platform: gpio
  pin: D1
  name: RC522 Reader Button
  id: rfid_button
  filters:
  - invert: null
switch:
- platform: restart
  name: RFID Reader Restart
  id: reboot
- platform: template
  name: RC522 Reader Buzzer Enabled
  id: buzzer_enabled
  icon: mdi:volume-high
  optimistic: true
- platform: template
  name: RC522 Reader LED enabled
  id: led_enabled
  icon: mdi:alarm-light-outline
  optimistic: true
output:
- platform: esp8266_pwm
  pin: D2
  id: buzzer
rtttl:
  output: buzzer
