esphome:
  name: subghz-rfid
esp32:
  board: esp32dev
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
spi:
- id: spi0
  clk_pin: GPIO18
  miso_pin: GPIO19
  mosi_pin: GPIO23
uart:
- id: rfid_uart
  rx_pin: GPIO16
  tx_pin: GPIO17
  baud_rate: 9600
cc1101:
  cs_pin: GPIO5
  gdo0_pin: GPIO4
  spi_id: spi0
  frequency: 433920000
  modulation_type: ASK/OOK
rdm6300:
  uart_id: rfid_uart
