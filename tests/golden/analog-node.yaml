esphome:
  name: analog-node
esp32:
  board: esp32dev
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
i2c:
- id: i2c0
  sda: GPIO21
  scl: GPIO22
  frequency: 100kHz
ads1115:
- id: ext_adc_hub
  address: '0x48'
  i2c_id: i2c0
sensor:
- platform: ads1115
  ads1115_id: ext_adc_hub
  multiplexer: A0_GND
  gain: 4.096
  name: Solar panel voltage
  update_interval: 30s
- platform: ads1115
  ads1115_id: ext_adc_hub
  multiplexer: A2_A3
  gain: 0.256
  name: Battery shunt current
  update_interval: 10s
- platform: adc
  pin: GPIO34
  name: Board 3V3 rail
  id: rail_v
  attenuation: 12db
  update_interval: 60s
  unit_of_measurement: V
