esphome:
  name: porch-button-light
esp8266:
  board: d1_mini
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
binary_sensor:
- platform: gpio
  pin: D5
  name: Porch Button
  id: porch_button
  on_press:
  - switch.toggle: porch_light
switch:
- platform: gpio
  pin: D6
  name: Porch Light
  id: porch_light
