esphome:
  name: esp32cam
esp32:
  board: esp32cam
  framework:
    type: esp-idf
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
esp32_camera:
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins:
  - GPIO5
  - GPIO18
  - GPIO19
  - GPIO21
  - GPIO36
  - GPIO39
  - GPIO34
  - GPIO35
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  name: ESP32-CAM
  resolution: 640x480
esp32_camera_web_server:
- port: 8080
  mode: stream
psram:
  mode: quad
  speed: 40MHz
