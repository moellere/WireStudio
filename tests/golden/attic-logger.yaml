esphome:
  name: attic-logger
esp8266:
  board: d1_mini
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
i2c:
- id: i2c0
  sda: D2
  scl: D1
  frequency: 100kHz
sensor:
- platform: dht
  model: DHT22
  pin: D5
  temperature:
    name: Attic climate Temperature
  humidity:
    name: Attic climate Humidity
  update_interval: 60s
- platform: bmp085
  i2c_id: i2c0
  update_interval: 60s
  temperature:
    name: Attic pressure Temperature
  pressure:
    name: Attic pressure Pressure
