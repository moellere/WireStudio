esphome:
  name: grill-probe
esp32:
  board: esp32dev
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
spi:
- id: spi0
  clk_pin: GPIO18
  miso_pin: GPIO19
  mosi_pin: GPIO23
i2c:
- id: i2c0
  sda: GPIO21
  scl: GPIO22
  frequency: 100kHz
sensor:
- platform: max31855
  spi_id: spi0
  cs_pin: GPIO5
  name: Grill probe Thermocouple
  update_interval: 5s
  reference_temperature:
    name: Grill probe Cold Junction
- platform: mpu6050
  address: '0x68'
  i2c_id: i2c0
  update_interval: 2s
  accel_x:
    name: Grill lid Accel X
  accel_y:
    name: Grill lid Accel Y
  accel_z:
    name: Grill lid Accel Z
  gyro_x:
    name: Grill lid Gyro X
  gyro_y:
    name: Grill lid Gyro Y
  gyro_z:
    name: Grill lid Gyro Z
  temperature:
    name: Grill lid Die Temp
