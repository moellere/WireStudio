esphome:
  name: garage-motion
esp32:
  board: esp32dev
  framework:
    type: arduino
logger:
  level: INFO
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
i2c:
- id: i2c0
  sda: GPIO21
  scl: GPIO22
  frequency: 100kHz
binary_sensor:
- platform: gpio
  pin: GPIO13
  name: Driveway PIR
  device_class: motion
sensor:
- platform: bme280_i2c
  address: '0x76'
  i2c_id: i2c0
  temperature:
    name: Porch climate Temperature
  humidity:
    name: Porch climate Humidity
  pressure:
    name: Porch climate Pressure
