esphome:
  name: led-display
esp32:
  board: esp32dev
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
spi:
- id: spi0
  clk_pin: GPIO18
  miso_pin: GPIO19
  mosi_pin: GPIO23
display:
  platform: tm1638
  id: panel
  stb_pin: GPIO16
  clk_pin: GPIO17
  dio_pin: GPIO4
  intensity: 5
