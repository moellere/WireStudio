esphome:
  name: t-beam
esp32:
  board: ttgo-t-beam
  framework:
    type: arduino
logger: {}
api:
  encryption:
    key: !secret api_key
ota:
- platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
captive_portal: {}
spi:
- id: spi0
  clk_pin: GPIO5
  miso_pin: GPIO19
  mosi_pin: GPIO27
uart:
- id: gps_uart
  rx_pin: GPIO34
  tx_pin: GPIO12
  baud_rate: 9600
sx127x:
  cs_pin: GPIO18
  rst_pin: GPIO23
  dio0_pin: GPIO26
  spi_id: spi0
  frequency: 433000000
  modulation: LORA
  preamble_size: 8
gps:
  uart_id: gps_uart
  latitude:
    name: GPS Latitude
  longitude:
    name: GPS Longitude
  altitude:
    name: GPS Altitude
  satellites:
    name: GPS Satellites
binary_sensor:
- platform: gpio
  pin: GPIO38
  name: Onboard button
  id: onboard_button
  filters:
  - invert: null
