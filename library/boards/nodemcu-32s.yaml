id: nodemcu-32s
name: NodeMCU-32S
mcu: esp32
chip_variant: esp32
framework: arduino
platformio_board: nodemcu-32s
flash_size_mb: 4

rails:
  - {name: "5V",  voltage: 5.0, source: usb}
  - {name: "3V3", voltage: 3.3, source: onboard_regulator}
  - {name: "GND", voltage: 0.0}

default_buses:
  i2c: {sda: GPIO21, scl: GPIO22}
  spi: {clk: GPIO18, miso: GPIO19, mosi: GPIO23}

# NodeMCU-32S exposes the same ESP32 pins as DevKitC-V4 plus an extra
# couple. Pin capabilities mirror the ESP32-WROOM-32 module.
gpio_capabilities:
  GPIO0:  [boot, strap]
  GPIO2:  [strap, gpio]
  GPIO4:  [gpio, adc, pwm]
  GPIO5:  [gpio, strap, spi_cs]
  GPIO12: [gpio, adc, strap]
  GPIO13: [gpio, adc, pwm]
  GPIO14: [gpio, adc, pwm]
  GPIO15: [gpio, adc, strap]
  GPIO16: [gpio]
  GPIO17: [gpio]
  GPIO18: [gpio, spi_clk]
  GPIO19: [gpio, spi_miso]
  GPIO21: [gpio, i2c_sda]
  GPIO22: [gpio, i2c_scl]
  GPIO23: [gpio, spi_mosi]
  GPIO25: [gpio, dac, adc, i2s_bclk]
  GPIO26: [gpio, dac, adc]
  GPIO27: [gpio, adc, pwm]
  GPIO32: [gpio, adc, pwm, i2s_dout]
  GPIO33: [gpio, adc, pwm, i2s_lrclk]
  GPIO34: [gpio, adc, input_only]
  GPIO35: [gpio, adc, input_only]
  GPIO36: [gpio, adc, input_only]
  GPIO39: [gpio, adc, input_only]
