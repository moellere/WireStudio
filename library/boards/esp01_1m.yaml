id: esp01_1m
name: ESP-01S 1MB module / Sonoff Basic
mcu: esp8266
chip_variant: esp8266
framework: arduino
platformio_board: esp01_1m
flash_size_mb: 1

rails:
  - {name: "5V",  voltage: 5.0, source: usb}
  - {name: "3V3", voltage: 3.3, source: onboard_regulator}
  - {name: "GND", voltage: 0.0}

# ESP-01S exposes only a handful of GPIOs. Sonoff Basic devices wire
# them to specific functions: GPIO0 = BUTTON (boot strap), GPIO12 = RELAY,
# GPIO13 = STATUS_LED.
gpio_capabilities:
  GPIO0:  [gpio, strap, button]
  GPIO1:  [gpio, uart_tx]
  GPIO2:  [gpio, strap, builtin_led]
  GPIO3:  [gpio, uart_rx]
  GPIO12: [gpio]
  GPIO13: [gpio]
  GPIO14: [gpio]
  GPIO15: [gpio, strap]
  GPIO16: [gpio]
