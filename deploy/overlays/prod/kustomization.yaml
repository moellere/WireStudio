apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay. Stable: the image is a pinned, immutable release
# tag. To promote a release to prod, change newTag below and let ArgoCD
# roll it out (one-line diff, one-commit rollback), or let
# argocd-image-updater bump it automatically (see docs/deployment.md).
namespace: wirestudio-prod

resources:
  - ../../

images:
  - name: ghcr.io/moellere/wirestudio
    newTag: "0.18.0"
