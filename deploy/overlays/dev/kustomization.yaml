apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev/staging overlay. Tracks the rolling :main-lorawan tag -- the
# -lorawan variant (PlatformIO baked in) so the LoRaWAN compile/flash
# flow works on staging; prod stays lean. Pair with argocd-image-updater
# to redeploy on every push to main (it digest-pins this tag); otherwise
# bump the digest by hand.
namespace: wirestudio-dev

resources:
  - ../../

images:
  - name: ghcr.io/moellere/wirestudio
    newTag: main-lorawan

# A LoRaWAN firmware build shells out to PlatformIO; the espressif32 link
# step peaks well past the base 512Mi limit and OOMKills the pod. Give the
# dev pod build headroom; the base manifest (and prod) stay lean.
patches:
  - target:
      kind: Deployment
      name: wirestudio
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: wirestudio
      spec:
        template:
          spec:
            containers:
              - name: wirestudio
                resources:
                  requests:
                    memory: 512Mi
                  limits:
                    memory: 2Gi
